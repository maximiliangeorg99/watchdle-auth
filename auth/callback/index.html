<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Watchdle...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0F0F0F;
      color: #F0F0F0;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 400px; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #969696; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: #336ECC;
      color: #fff;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.85; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <!-- iOS: auto-redirects, this is only shown briefly -->
    <div id="ios-view">
      <h1>Redirecting to Watchdle...</h1>
    </div>
    <!-- Android: show a button (Chrome Custom Tabs need a user gesture for intent://) -->
    <div id="android-view" class="hidden">
      <h1>Authentication complete!</h1>
      <p>Tap the button below to return to the app.</p>
      <a id="open-btn" class="btn" href="#">Open Watchdle</a>
    </div>
  </div>
  <script>
    var qs = window.location.search;
    var customScheme = 'watchdle://auth/callback' + qs;
    var isAndroid = /android/i.test(navigator.userAgent);
    var isMobile = isAndroid || /iphone|ipad|ipod/i.test(navigator.userAgent);

    // Build intent:// fallback for Android
    var intentUri = 'intent://auth/callback' + qs +
      '#Intent;scheme=watchdle;package=com.watchdle.app;' +
      'S.browser_fallback_url=' + encodeURIComponent(window.location.href) + ';end';

    if (!isMobile) {
      // Desktop/web: send the auth code back via BroadcastChannel + postMessage fallback
      var sent = false;

      // BroadcastChannel is reliable even when window.opener is nulled by cross-origin redirects
      try {
        var bc = new BroadcastChannel('watchdle-auth');
        bc.postMessage({ type: 'watchdle-auth-callback', url: window.location.href });
        bc.close();
        sent = true;
      } catch (e) {}

      // Also try postMessage as fallback
      if (window.opener) {
        try {
          window.opener.postMessage({ type: 'watchdle-auth-callback', url: window.location.href }, '*');
          sent = true;
        } catch (e) {}
      }

      document.getElementById('ios-view').innerHTML = sent
        ? '<h1>Authentication complete!</h1><p>You can close this window.</p>'
        : '<h1>Authentication complete!</h1><p>Please close this window and return to the app.</p>';
      if (sent) setTimeout(function () { window.close(); }, 1000);
    } else if (isAndroid) {
      // Android: auto-redirect via custom scheme first.
      document.getElementById('open-btn').href = intentUri;
      window.location.replace(customScheme);

      setTimeout(function () {
        document.getElementById('ios-view').classList.add('hidden');
        document.getElementById('android-view').classList.remove('hidden');
      }, 1000);
    } else {
      // iOS: ASWebAuthenticationSession intercepts the custom scheme redirect immediately
      window.location.replace(customScheme);
    }
  </script>
</body>
</html>
