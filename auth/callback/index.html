<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Watchdle...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0F0F0F;
      color: #F0F0F0;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 400px; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #969696; font-size: 0.875rem; }
    a { color: #336ECC; text-decoration: none; }
    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #336ECC;
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Redirecting to Watchdle...</h1>
    <p>If the app doesn't open automatically:</p>
    <a id="manual-link" class="btn" href="#">Open Watchdle</a>
  </div>
  <script>
    var qs = window.location.search;
    var customScheme = 'watchdle://auth/callback' + qs;
    var isAndroid = /android/i.test(navigator.userAgent);

    // Android: intent:// with package name so Chrome can reliably resolve the app.
    // S.browser_fallback_url prevents Chrome from going to the Play Store if app isn't found.
    var intentUri = 'intent://auth/callback' + qs +
      '#Intent;scheme=watchdle;package=com.watchdle.app;' +
      'S.browser_fallback_url=' + encodeURIComponent(window.location.href) + ';end';

    var link = isAndroid ? intentUri : customScheme;
    document.getElementById('manual-link').href = link;

    // Small delay lets Chrome Custom Tab settle before attempting the redirect
    setTimeout(function() {
      window.location.replace(link);
    }, 100);
  </script>
</body>
</html>
