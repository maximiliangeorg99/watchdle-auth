<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Watchdle...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0F0F0F;
      color: #F0F0F0;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 400px; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #969696; font-size: 0.875rem; }
    a { color: #336ECC; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Redirecting to Watchdle...</h1>
    <p>If the app doesn't open automatically, <a id="manual-link" href="#">tap here</a>.</p>
  </div>
  <script>
    // Forward all query params to the native app scheme
    var deepLink = 'watchdle://auth/callback' + window.location.search;
    document.getElementById('manual-link').href = deepLink;
    window.location.replace(deepLink);
  </script>
</body>
</html>
