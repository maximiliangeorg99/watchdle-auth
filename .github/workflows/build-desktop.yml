name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
            artifact: Watchdle-macos-arm64
            ext: zip
          - os: macos-13
            platform: macos-x64
            artifact: Watchdle-macos-x64
            ext: zip
          - os: windows-latest
            platform: win-x64
            artifact: Watchdle-win-x64
            ext: zip
          - os: ubuntu-latest
            platform: linux-x64
            artifact: Watchdle-linux-x64
            ext: tar.gz

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: npm ci

      - name: Install ElectroBun dependencies
        run: cd electrobun && bun install

      - name: Build release
        run: cd electrobun && bun run build:release

      - name: Package artifact (zip)
        if: matrix.ext == 'zip'
        run: |
          cd electrobun/build
          zip -r ${{ matrix.artifact }}.zip release-*/ || powershell Compress-Archive -Path release-*/* -DestinationPath ${{ matrix.artifact }}.zip
        shell: bash

      - name: Package artifact (tar.gz)
        if: matrix.ext == 'tar.gz'
        run: |
          cd electrobun/build
          tar -czf ${{ matrix.artifact }}.tar.gz release-*/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: electrobun/build/${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
